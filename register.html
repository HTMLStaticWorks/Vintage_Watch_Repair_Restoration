<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Restore Atelier</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body style="background: var(--bg-light); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; position: relative; padding: 2rem 0;">
    
    <!-- Background Texture -->
    <i class="fas fa-cog" style="position: absolute; top: -100px; left: -100px; font-size: 500px; color: rgba(184, 149, 63, 0.03); animation: rotate 60s linear infinite;"></i>
    <i class="fas fa-cog" style="position: absolute; bottom: -100px; right: -100px; font-size: 500px; color: rgba(184, 149, 63, 0.03); animation: rotate 60s linear infinite reverse;"></i>

    <div class="auth-card" style="width: 100%; max-width: 480px; padding: 4rem; border-radius: 8px; box-shadow: 0 40px 100px rgba(0,0,0,0.5); text-align: center; position: relative; z-index: 1;">
        <a href="index.html" class="logo" style="display: block; margin-bottom: 2rem; font-size: 2rem;"><i class="fas fa-clock" style="margin-right: 15px;"></i>RESTORE</a>
        <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; margin-bottom: 2rem;" class="italic">Create Your Atelier Account</h2>
        
        <form style="display: flex; flex-direction: column; gap: 1.2rem; text-align: left;">
            <div style="display: flex; flex-direction: column;">
                <label style="font-family: 'Cinzel', serif; font-size: 0.75rem; margin-bottom: 0.4rem;">Full Name</label>
                <input type="text" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: transparent;" required>
            </div>
            <div style="display: flex; flex-direction: column;">
                <label style="font-family: 'Cinzel', serif; font-size: 0.75rem; margin-bottom: 0.4rem;">Email Address</label>
                <input type="email" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: transparent;" required>
            </div>
                <div style="display: flex; flex-direction: column;">
                    <label style="font-family: 'Cinzel', serif; font-size: 0.75rem; margin-bottom: 0.4rem;">Password</label>
                    <input type="password" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: transparent;" required>
                </div>
               
             <div style="display: flex; flex-direction: column;">
                    <label style="font-family: 'Cinzel', serif; font-size: 0.75rem; margin-bottom: 0.4rem;">Confirm Password</label>
                    <input type="password" style="padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: transparent;" required>
                </div>

            <div style="display: flex; align-items: flex-start; gap: 10px; margin: 0.5rem 0;">
                <input type="checkbox" id="terms" style="margin-top: 5px; cursor: pointer;" required>
                <label for="terms" style="font-size: 0.75rem; color: #666; cursor: pointer;">I accept the Terms & Conditions and acknowledge the restoration services agreement.</label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; background: var(--secondary);">Register</button>
        </form>

        <div style="display: flex; align-items: center; margin: 2rem 0; gap: 15px;">
            <div style="flex: 1; height: 1px; background: #ddd;"></div>
            <span style="font-size: 0.75rem; color: #999; font-family: 'Cinzel', serif;">OR</span>
            <div style="flex: 1; height: 1px; background: #ddd;"></div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
            <button class="btn btn-outline" style="width: 100%; border-color: #ddd; color: var(--text-dark); padding: 12px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 15px;">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.79 2.717v2.258h2.9c1.7-.158 2.686-3.1 2.686-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.9-2.258c-.806.54-1.837.86-3.056.86-2.352 0-4.34-1.587-5.053-3.72H1.057v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                    <path d="M3.947 10.702c-.18-.54-.282-1.117-.282-1.702s.102-1.162.282-1.702V4.966H1.057A8.996 8.996 0 000 9c0 1.451.346 2.822.957 4.032l2.99-2.33z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.32 0 2.508.455 3.19.066l2.394-2.394C12.463.85 10.43 0 9 0 5.483 0 2.443 2.049 1.057 4.966L4.047 7.298C4.76 5.165 6.748 3.58 9 3.58z" fill="#EA4335"/>
                </svg> Register with Google
            </button>
            <button class="btn btn-outline" style="width: 100%; border-color: #ddd; color: var(--text-dark); padding: 12px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 15px;">
                <i class="fas fa-envelope" style="color: #EA4335; font-size: 1.1rem;"></i> Register with Email
            </button>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #666;">
            Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 600;">Login</a>
        </p>
    </div>

    <style>
        /* Hide Scrollbar but keep functionality */
        body { -ms-overflow-style: none; scrollbar-width: none; }
        body::-webkit-scrollbar { display: none; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        [dir="rtl"] .auth-card { direction: ltr; text-align: center; }
        [dir="rtl"] .auth-card form { text-align: left; }
        @media (max-width: 480px) {
            .auth-card { padding: 3rem 1.5rem; margin: 1rem; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
    <!-- Scripts (For theme initialization) -->
    <script src="main.js"></script>
</body>
</html>
