<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Restore Atelier</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS (Auth minimal) -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="auth-page">
    <div class="auth-toggles">
        <button class="toggle-btn rtl-toggle" title="Toggle RTL"><i class="fas fa-exchange-alt"></i></button>
        <button class="toggle-btn theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
    </div>
    
    <!-- Background Texture -->
    <i class="fas fa-cog" style="position: absolute; top: -100px; right: -100px; font-size: 500px; color: rgba(184, 149, 63, 0.03); animation: rotate 60s linear infinite;"></i>
    <i class="fas fa-cog" style="position: absolute; bottom: -100px; left: -100px; font-size: 500px; color: rgba(184, 149, 63, 0.03); animation: rotate 60s linear infinite reverse;"></i>

    <div class="auth-card">
        <a href="index.html" class="logo"><i class="fas fa-clock"></i>RESTORE</a>
        <h2 class="italic">Welcome Back to the Atelier</h2>
        
        <form class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
                
                <div class="form-footer">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div class="social-auth">
            <button class="btn btn-social">
                <img src="https://www.google.com/favicon.ico" alt="Google"> Login with Google
            </button>
            <button class="btn btn-social">
                <i class="fas fa-envelope"></i> Login with Email
            </button>
        </div>

        <p class="auth-redirect">
            Don't have an account? <a href="register.html">Register</a>
        </p>
    </div>

    <!-- Scripts (For theme initialization) -->
    <script src="main.js"></script>
</body>
</html>
